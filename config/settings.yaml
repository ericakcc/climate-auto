data_dir: "./data"
timezone: "Asia/Taipei"
max_retries: 3
retry_delay_seconds: 2.0
request_timeout_seconds: 30.0
max_concurrent_downloads: 3

browser:
  headless: true
  viewport_width: 1920
  viewport_height: 1080

sources:
  ncdr_ecmwf:
    enabled: true
    variables:
      - "500"
      - "850"
      - "850mf"
      - "700"
      - "200"
      - "1000"
      - "8530"
    forecast_hours: [0, 24, 48]
    daily_rain_days: [1, 2, 3]

  ncdr_dwp:
    enabled: true
    variables:
      - "500"
      - "850"
      - "QV850"
    forecast_hours: [0, 24, 48]

  ncdr_corrdiff:
    enabled: true
    parameters:
      - "radar_wind"
      - "tw_t2m"
      - "sp"
      - "rr"
    forecast_hours: [0, 6, 12, 24, 48]

  cwa_main:
    enabled: true
    satellite_types:
      - "LCC_IR1_CR_2750"
      - "LCC_TRGB_1000"

  cwa_marine:
    enabled: true

# LLM chart analysis. Runs via the claude-agent-sdk, which delegates to the
# logged-in `claude` CLI. If ANTHROPIC_API_KEY is NOT set in the environment,
# calls draw from your Claude subscription's monthly Agent SDK credit pool
# instead of being billed per-token. See README "LLM analysis" for setup.
analyzer:
  enabled: false
  model: "claude-sonnet-4-6"
  max_turns: 15
  # Per-call ceiling on the SDK's *reported* cost (USD). Under a subscription
  # this is informational (no per-token billing); under an API key it caps spend
  # per agent call — note total spend ~= calls x this value, not a global cap.
  budget_limit_usd: 5.0
  # Parallel chart extractions. Lower this if you hit subscription rate limits.
  concurrency: 3

# Numeric (route-2) pipeline: compute fields from ECMWF open-data instead of
# reading GIFs with the vision model. Enable with `enabled: true` or `--numeric`.
# Needs the optional deps: `uv sync --extra numerical`.
numerical:
  enabled: false
  run_time: 0          # ECMWF run hour (0/6/12/18)
  steps: [0, 24, 48]   # 0 = analysis (f000), then forecasts
  sounding_lat: 25.0   # Taipei, for forecast soundings (report 2-II / 3-III)
  sounding_lon: 121.5
  # Image charts to SKIP in vision because the numeric route replaces them.
  # Covered: 500 hPa height field, 850 hPa moisture flux, deterministic daily
  # rain (ECMWF tp). Kept on vision (no clean free numeric / spatial task):
  # ECMWF700, ensemble rain (dailyensrn), radar, satellite, observed Skew-T.
  replace_chart_patterns:
    - "ECMWF500"
    - "ECMWF700"
    - "ECMWF850mf"
    - "dailyrn"
